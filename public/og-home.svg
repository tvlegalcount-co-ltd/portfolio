<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0274be;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#013052;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="#ffffff" opacity="0.05"/>

  <!-- Logo/Icon -->
  <g transform="translate(100, 150) scale(3)">
    <rect width="32" height="32" rx="6" fill="#ffffff" opacity="0.2"/>
    <rect x="1" y="14" width="16" height="2" rx="1" fill="#ffffff"/>
    <rect x="8.5" y="8" width="3" height="10" rx="1.5" fill="#ffffff"/>
    <ellipse cx="4" cy="13" rx="3.5" ry="2.5" fill="#66bbed" stroke="#ffffff" stroke-width="0.5"/>
    <ellipse cx="14" cy="13" rx="3.5" ry="2.5" fill="#66bbed" stroke="#ffffff" stroke-width="0.5"/>
    <circle cx="9" cy="4" r="2.5" fill="#fbbf24" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Text Content -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">TV Legal Count</text>
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0.9">Tư vấn thành lập doanh nghiệp,</text>
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0.9">pháp lý, kế toán thuế</text>

  <!-- Badge -->
  <rect x="480" y="450" width="240" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
  <text x="600" y="483" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Hơn 2.000 khách hàng</text>
</svg>
